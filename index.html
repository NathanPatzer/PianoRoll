<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css">
    <title>PixiJS - Template</title>
</head>

<body>
    <div id="app">
        <div id="controls">
            <label for="width-grid-slider">Grid Width</label>
            <input type="range" id="width-grid-slider" min="25" max="500" value="50" />

            <label for="height-grid-slider">Grid Height</label>
            <input type="range" id="height-grid-slider" min="25" max="500" value="50" />
        </div>
        <div id="pixi-container"></div>
        <button id="play">Play</button>
        <button id="stop">Stop</button>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
